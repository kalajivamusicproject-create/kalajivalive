<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalajiva - Live Performance Interaction</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Firebase SDK (Mode Offline-First: Tidak akan error jika API Key kosong) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Konfigurasi dalam mode default (Kosongkan API Key untuk menghindari error)
    const firebaseConfig = {
      apiKey: "", 
      authDomain: "kalajiva-web.firebaseapp.com",
      projectId: "kalajiva-web",
      storageBucket: "kalajiva-web.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abcdef"
    };

    const appId = 'kalajiva-app';

    // Inisialisasi dengan proteksi (Jika API Key kosong, sistem akan lewat)
    try {
      if (firebaseConfig.apiKey !== "") {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.FirebaseDB = db;
        window.FirebaseAppId = appId;
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;

        signInAnonymously(auth).then(() => {
          onAuthStateChanged(auth, (user) => {
            window.FirebaseUser = user;
            if (typeof window.listenToRequests === 'function') window.listenToRequests();
          });
        });
      } else {
        console.log("Web berjalan dalam mode Offline (Request tersimpan lokal).");
      }
    } catch (e) {
      console.log("Sistem berjalan dalam mode mandiri.");
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FCFAF7; }

</head>
<body class="text-stone-800 min-h-screen antialiased">

        <a href="https://wa.me/62895339899333" target="_blank" class="flex items-center justify-center gap-2 px-5 py-2.5 rounded-full bg-gradient-to-r from-emerald-600 to-emerald-800 text-[#FFFDD0] text-xs font-semibold shadow-md">BOOKING & HUBUNGI WA</a>

    <nav class="flex gap-2 mb-6">
      <button onclick="switchTab('songlist')" id="tab-btn-songlist" class="flex-1 py-2.5 rounded-xl text-sm font-semibold glass-card active-category shadow-sm">🎵 Songlist</button>
      <button onclick="switchTab('request')" id="tab-btn-request" class="flex-1 py-2.5 rounded-xl text-sm font-semibold glass-card text-stone-600 shadow-sm">💬 Request</button>
    </nav>

      <div class="glass-card rounded-2xl p-5 shadow-sm">

        <input type="text" id="req-sender" placeholder="Nama / Meja" class="w-full rounded-xl border p-3 mb-3 text-sm">

        <button onclick="submitRequest()" class="w-full py-3 rounded-xl bg-amber-800 text-[#FFFDD0] font-bold text-sm">KIRIM SEKARANG</button>
      </div>
    </div>
  </div>

  <script>
    // FUNGSI DASAR TETAP BERJALAN MESKI OFFLINE
    const songs = [{ id: 1, title: "Satu Bulan", artist: "Bernadya", category: "galau" }];
    
    window.switchTab = function(tabName) {
      document.getElementById('tab-songlist').classList.add('hidden');
      document.getElementById('tab-request').classList.add('hidden');
      document.getElementById(`tab-${tabName}`).classList.remove('hidden');
    };

    window.submitRequest = function() {
      alert("Pesan berhasil dicatat secara lokal!");
    };
